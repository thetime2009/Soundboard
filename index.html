<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แอพเสียงแสนสนุก 20 ปุ่ม</title>
    <style>
        body { 
            font-family: 'Tahoma', sans-serif; 
            text-align: center; 
            background-color: #FFF9E3; /* สีพื้นหลังอ่อนๆ สบายตา */
            margin: 0;
            padding: 20px;
        }
        
        h1 { color: #FF6F61; margin-bottom: 20px; }

        .container { 
            display: grid; 
            /* กำหนดให้มี 4 คอลัมน์ เท่าๆ กัน */
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            max-width: 500px; 
            margin: 0 auto; 
        }

        .btn { 
            aspect-ratio: 1/1; /* ทำให้ปุ่มเป็นสี่เหลี่ยมจัตุรัส */
            border: none; 
            border-radius: 25px; 
            font-size: 30px; /* ขนาด Emoji ใหญ่ขึ้น */
            cursor: pointer;
            box-shadow: 0 6px #ccc; 
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* เอฟเฟกต์ตอนกดปุ่ม */
        .btn:active { 
            box-shadow: 0 2px #666; 
            transform: translateY(4px); 
        }

        /* สีแบ่งตามหมวดหมู่ */
        .animal { background-color: #FFB7B2; }   /* สีชมพูอ่อน */
        .activity { background-color: #B2E2F2; } /* สีฟ้าอ่อน */
        .fruit { background-color: #FFDAC1; }    /* สีส้มอ่อน */
        .family { background-color: #E2F0CB; }   /* สีเขียวอ่อน */
        .extra { background-color: #D9BBF9; }    /* สีม่วงอ่อน */

        .label { 
            font-size: 14px; 
            margin-top: 5px; 
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>กดฟังเสียงกันเถอะ! 🎈</h1>

    <div class="container" id="app-grid">
        <!-- ปุ่มจะถูกสร้างขึ้นมา 20 ปุ่ม (4x5) -->
    </div>

    <script>
        const data = [
            { cat: "สัตว์", color: "animal", icons: ["🐶", "🐱", "🦁", "🐘"] },
            { cat: "กิจกรรม", color: "activity", icons: ["🏃", "😴", "🛁", "🍽️"] },
            { cat: "ผลไม้", color: "fruit", icons: ["🍎", "🍌", "🍇", "🍉"] },
            { cat: "ญาติ", color: "family", icons: ["👨", "👩", "👴", "👵"] },
            { cat: "อื่นๆ", color: "extra", icons: ["🚗", "🏠", "🎁", "🔔"] }
        ];

        const grid = document.getElementById('app-grid');

        // วนลูปสร้างปุ่มตามหมวดหมู่
        data.forEach(item => {
            item.icons.forEach(icon => {
                const btn = document.createElement('button');
                btn.className = `btn ${item.color}`;
                btn.innerHTML = `
                    <span>${icon}</span>
                    <div class="label">${item.cat}</div>
                `;
                
                btn.onclick = () => {
                    console.log(`กดหมวด: ${item.cat}`);
                    // ใส่ฟังก์ชันเล่นเสียงตรงนี้
                };
                
                grid.appendChild(btn);
            });
        });
    </script>
</body>
</html>
